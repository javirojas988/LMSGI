<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Javier Rojas Aguilar">
    <link rel="icon" type="png" href="/imagenes/icono.png">
    <link rel="stylesheet" href="../estilos.css">
    <title>PokeType</title>
</head>

<body>
    <header>
        <div>
            <img src="/imagenes/titulo.png" alt="PokeType Logo" class="logo">
        </div>
        <nav class="navegacion">
            <ul class="menu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="/pages/juego.html">Juego</a></li>
                <li><a href="/pages/sobremi.html">Sobre mi</a></li>
            </ul>
        </nav>
    </header>


    <main class="main-juego">
        <div class="div-boton-generar" >
            <button id="boton-juego" class="boton-generar" >Generar Pokémon</button>
        </div>
        
        <!--  -->
        <div class="" id="pokemon-aleatorio">
            <!-- aqui ira imagen , tipos y nombre del poke generado -->
            
        </div>

        <div class="botones-tipos">
            <button class="tipo-normal" id="normal">Normal</button>
            <button class="tipo-fire" id="fire">Fuego</button>
            <button class="tipo-water" id="water">Agua</button>
            <button class="tipo-grass" id="grass">Planta</button>
            <button class="tipo-electric" id="electric">Eléctrico</button>
            <button class="tipo-ice" id="ice">Hielo</button>
            <button class="tipo-fighting" id="fighting">Lucha</button>
            <button class="tipo-poison" id="poison">Veneno</button>
            <button class="tipo-ground" id="ground">Tierra</button>
            <button class="tipo-flying" id="flying">Volador</button>
            <button class="tipo-psychic" id="psychic">Psíquico</button>
            <button class="tipo-bug" id="bug">Bicho</button>
            <button class="tipo-rock" id="rock">Roca</button>
            <button class="tipo-ghost" id="ghost">Fantasma</button>
            <button class="tipo-dragon" id="dragon">Dragón</button>
            <button class="tipo-dark" id="dark">Siniestro</button>
            <button class="tipo-steel" id="steel">Acero</button>
            <button class="tipo-fairy" id="fairy">Hada</button>
        </div>
        
        <div class="resultado" >
            <p><strong>RESULTADO</strong></p>
            <div id="juego-resultado">
            <!-- aqui ira el resultado Win or loose -->
           </div> 
        </div>
    </main>


    <footer>
        <p>Javier Rojas Aguilar</p>
        <a href="https://github.com/javirojas988">
            <img src="../imagenes/github.png" alt="github">
        </a>
        <p> 1º DAW</p>
    </footer>
    <script src="/js/script.js"></script>
</body>

</html>
