<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="png" href="/imagenes/icono.png">
    <link rel="stylesheet" href="../estilos.css">
    <title>PokeType</title>
</head>

<body>
    <header>
        <div>
            <img src="/imagenes/titulo.png" alt="PokeType Logo" class="logo">
        </div>
        <nav class="navegacion">
            <ul class="menu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="/pages/juego.html">Juego</a></li>
                <li><a href="/pages/sobremi.html">Sobre mi</a></li>
            </ul>
        </nav>
    </header>


    <main class="main-juego">
        <div class="pokemon-aleatorio">
            <img id="pokemon-imagen" src="" alt="Imagen del pokémon rival">
            <p id="pokemon-nombre"></p>
            <p id="pokemon-tipo"></p>
            <button id="btn-generar">Generar Pokémon</button>
        </div>
        <div class="botones-tipos">
            <button>Normal</button>
            <button>Fuego</button>
            <button>Agua</button>
            <button>Planta</button>
            <button>Eléctrico</button>
            <button>Hielo</button>
            <button>Lucha</button>
            <button>Veneno</button>
            <button>Tierra</button>
            <button>Volador</button>
            <button>Psíquico</button>
            <button>Bicho</button>
            <button>Roca</button>
            <button>Fantasma</button>
            <button>Dragón</button>
            <button>Siniestro</button>
            <button>Acero</button>
            <button>Hada</button>
        </div>
        <div class="resultado">
            <p id="resultado-texto"></p>
        </div>
    </main>


    <footer>
        <p>Javier Rojas Aguilar</p>
        <a href="https://github.com/javirojas988">
